services:
  frontend:
    ports:
      - "${FRONTEND_HOST_PORT}:${FRONTEND_INTERNAL_PORT}"

  backend:
    ports:
      - "${BACKEND_HOST_PORT}:${BACKEND_INTERNAL_PORT}"

  postgres:
    ports:
      - "${POSTGRES_HOST_PORT}:${POSTGRES_INTERNAL_PORT}"

  prometheus:
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"

  grafana:
    ports:
      - "${GRAFANA_HOST_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-grafana_dev}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-grafana_dev_password}
