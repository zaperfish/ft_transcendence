<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Chat Test</title>
  </head>
  <body>
    <h1>Chat Test</h1>

    <p>
      Name:
      <input id="name" type="text" />
      Password:
      <input id="password" type="password" />
      <button id="login">Login</button>
    </p>

    <p>
      Event ID:
      <input id="event-id" type="number" value="1" />
      <button id="connect">Connect</button>
      <button id="disconnect">Disconnect</button>
    </p>

    <h2>Messages</h2>
    <pre id="messages"></pre>

    <p>
      Message:
      <input id="message" type="text" />
      <button id="send">Send</button>
    </p>

    <h2>Log</h2>
    <pre id="log"></pre>

    <script>
      let ws;

      const name = document.querySelector("#name");
      const password = document.querySelector("#password");
      const eventID = document.querySelector("#event-id");
      const message = document.querySelector("#message");
      const messages = document.querySelector("#messages");
      const log = document.querySelector("#log");

      function write(text, value) {
        log.textContent += `${text} ${value ? JSON.stringify(value) : ""}\n`;
      }

      function writeMessage(value) {
        messages.textContent += `${JSON.stringify(value)}\n`;
      }

      document.querySelector("#login").onclick = async () => {
        const response = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: name.value,
            password: password.value,
          }),
        });

        write("login", { status: response.status });
      };

      document.querySelector("#connect").onclick = () => {
        const protocol = location.protocol === "https:" ? "wss:" : "ws:";
        const url = `${protocol}//${location.host}/api/events/${eventID.value}/chat/ws`;

        ws = new WebSocket(url);
        write("connecting", { url });

        ws.onopen = () => write("connected");
        ws.onclose = (event) =>
          write("closed", { code: event.code, reason: event.reason });
        ws.onerror = () => write("error");
        ws.onmessage = (event) => writeMessage(JSON.parse(event.data));
      };

      document.querySelector("#disconnect").onclick = () => {
        if (ws) ws.close();
      };

      document.querySelector("#send").onclick = () => {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
          write("not connected");
          return;
        }

        ws.send(JSON.stringify({ content: message.value }));
        write("sent", { content: message.value });
        message.value = "";
      };
    </script>
  </body>
</html>
